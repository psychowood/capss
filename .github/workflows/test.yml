name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Install ImageMagick
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick ghostscript
        # Show installed version
        convert --version || true
        identify --version || true
        magick --version 2>/dev/null || echo "magick not available (using convert)"
    
    - name: Relax ImageMagick policies for PDF
      run: |
        sudo sed -i 's/rights="none"/rights="read|write"/g' /etc/ImageMagick-6/policy.xml
    
    - name: Run test suite
      run: |
        chmod +x test_capss.sh
        ./test_capss.sh
    
    - name: Test result summary
      if: always()
      run: |
        echo "Test suite completed"
